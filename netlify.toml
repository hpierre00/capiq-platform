[build]
  publish = "."
  functions = "netlify/functions"

# CTCReady.com → underlytix.com with UTM tracking (campaign redirect)
# This rule fires when the host is ctcready.com
[[redirects]]
  from = "https://ctcready.com/*"
  to = "https://underlytix.com/app?utm_source=ctcready&utm_medium=direct&utm_campaign=ctcready_brand"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ctcready.com/*"
  to = "https://underlytix.com/app?utm_source=ctcready&utm_medium=direct&utm_campaign=ctcready_brand"
  status = 301
  force = true

# www.underlytix.com → underlytix.com canonical
[[redirects]]
  from = "https://www.underlytix.com/*"
  to = "https://underlytix.com/:splat"
  status = 301
  force = true

# Legal pages — must be before the SPA catch-all
[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# Root serves the marketing landing page
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Standalone portal routes
[[redirects]]
  from = "/realtor"
  to = "/realtor.html"
  status = 200

[[redirects]]
  from = "/lender"
  to = "/lender.html"
  status = 200

# /app serves the investor portal
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app.html"
  status = 200

# SPA fallback — only for /app subroutes, not root
[[redirects]]
  from = "/app/**"
  to = "/app.html"
  status = 200
