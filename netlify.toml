[build]
  publish = "."
  functions = "netlify/functions"

# CTCReady.com → underlytix.com with UTM tracking (campaign redirect)
# This rule fires when the host is ctcready.com
[[redirects]]
  from = "https://ctcready.com/*"
  to = "https://underlytix.com/app?utm_source=ctcready&utm_medium=direct&utm_campaign=ctcready_brand"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ctcready.com/*"
  to = "https://underlytix.com/app?utm_source=ctcready&utm_medium=direct&utm_campaign=ctcready_brand"
  status = 301
  force = true

# www.underlytix.com → underlytix.com canonical
[[redirects]]
  from = "https://www.underlytix.com/*"
  to = "https://underlytix.com/:splat"
  status = 301
  force = true

# Realtor portal shortcut URL
[[redirects]]
  from = "/realtor"
  to = "/app?mode=realtor"
  status = 301
  force = true

[[redirects]]
  from = "/realtor/*"
  to = "/app?mode=realtor"
  status = 301
  force = true

# /app serves the investor/realtor/lender app (index.html)
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app.html"
  status = 200

# SPA fallback for app routes
[[redirects]]
  from = "/*"
  to = "/app.html"
  status = 200
